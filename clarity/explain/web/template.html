<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity - Repo Explanation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Summary Card -->
        <div class="card summary-card">
            <h2>Project Overview</h2>
            <p id="summaryText">Loading summary...</p>
        </div>
        
        <div class="content-grid">
            <div class="sidebar">
                <!-- Stack List -->
                <div class="card stack-card">
                    <h2>Tech Stack</h2>
                    <div id="stackList"></div>
                </div>
                
                <!-- Stats Card -->
                <div class="card stats-card" style="margin-top: 1.5rem;">
                    <h2>Project Stats</h2>
                    <div id="statsList"></div>
                </div>
            </div>
            
            <!-- Diagram Canvas -->
            <div class="card diagram-card">
                <h2>Pipeline Architecture</h2>
                <div id="diagramContainer">
                    <svg id="edgesSvg"></svg>
                    <div id="nodesContainer"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Data Injected by CLI -->
    <script id="injectedData">
        window.CLARITY_DATA = {
            summary: "This is a placeholder summary.",
            stack: {"backend": ["Python"]},
            diagram: {
                nodes: [{"id": "node_1", "label": "Python", "category": "backend"}],
                edges: []
            },
            stats: {
                file_count: 0,
                folder_depth: 0,
                entry_points: 0
            }
        };
    </script>
    <script src="animate.js"></script>
</body>
</html>
