services:
  - type: web
    name: clarity
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      cd clarity-engine &&
      npm install &&
      npm run build
    startCommand: uvicorn clarity.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
